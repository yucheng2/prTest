server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/todo_app?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  security:
    jwt:
      secret-key: 5c62b8406ea8e3a9688f44f178c56b7d024e4d7e3c5c3b6f4a7e6d5c4b3a2f1e
      expiration-time: 86400000 # 24 hours

logging:
  level:
    com.todolist: DEBUG
    org.springframework.security: DEBUG